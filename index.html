<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <!-- Icon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <!-- Title -->
  <title>Tip Calculator App</title>

  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css">

</head>
<body>

  <header class="header">
    <img src="./images/logo.svg" class="header__logo" alt="Splitter logo">
  </header>

  <main>
    <form>
      <fieldset>
        <label for="bill">Bill</label>
        <div>

          <img src="./images/icon-dollar.svg" alt="dollar icon">

          <input type="text" id="bill" name="bill" placeholder="$142.55">          
        </div>
      </fieldset>

      <fieldset>
        <legend>Select Tip %</legend>

        <div>
            <input type="radio" id="5" name="tip" value="5">
            <label for="5">5%</label>

            <input type="radio" id="10" name="tip" value="10">
            <label for="10">10%</label>

            <input type="radio" id="15" name="tip" value="15">
            <label for="15">15%</label>

            <input type="radio" id="25" name="tip" value="25">
            <label for="25">25%</label>

            <input type="radio" id="50" name="tip" value="50">
            <label for="50">50%</label>

            <label for="custom">Custom</label>
            <input type="number" id="custom" name="tip" placeholder="Custom">
        </div>
      </fieldset>

      <fieldset>
        <label for="people">Number of People</label>
        <div>

          <img src="./images/icon-person.svg" alt="icon person">

          <input type="number" id="people" name="people" placeholder="5">          
        </div>
      </fieldset>
    </form>

    <section>
      <div>
        <div>
          <div>
            <p>Tip Amount</p>

            <p>/ person</p>
          </div>

          <p>$4.27</p>
        </div>

        <div>
          <div>
            <p>Total</p>

            <p>/ person</p>
          </div>

          <p>$32.79</p>
        </div>
      </div>

      <button type="reset">Reset</button>
    </section>
  </main>
  
</body>
</html>
