<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <!-- Icon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <!-- Title -->
  <title>Tip Calculator App</title>

  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css">

</head>
<body>

  <header class="header">
    <img src="./images/logo.svg" class="header__logo" alt="Splitter logo">
  </header>

  <main class="calculator">
    <form class="form" id="form-tip">
      <fieldset class="fieldset">
        <label class="fieldset__title text--p5" for="bill">Bill</label>
        <div class="fieldset__input">

          <img src="./images/icon-dollar.svg" alt="dollar icon">

          <input class="text--p3" type="number" id="bill" name="bill" placeholder="0">          
        </div>
      </fieldset>

      <fieldset class="tip-percentage">
        <legend class="tip-percentage__heading text--p5">Select Tip %</legend>

        <div class="grid">
          <div>
            <input type="radio" class="grid__button" id="5" name="tip" value="5">
            <label class="grid__label text--p3" for="5">5%</label>
          </div>

          <div>
            <input type="radio" class="grid__button" id="10" name="tip" value="10">
            <label class="grid__label text--p3" for="10">10%</label>
          </div>

          <div>
            <input type="radio" class="grid__button" id="15" name="tip" value="15">
            <label class="grid__label text--p3" for="15">15%</label>
          </div>

          <div>
            <input type="radio" class="grid__button" id="25" name="tip" value="25">
            <label class="grid__label text--p3" for="25">25%</label>
          </div>

          <div>
            <input type="radio" class="grid__button" id="50" name="tip" value="50">
            <label class="grid__label text--p3" for="50">50%</label>
          </div>

          <div>
            <input class="grid__write-button text--p3" type="number" id="custom" name="tip" placeholder="Custom">
          </div>
        </div>
      </fieldset>

      <fieldset class="fieldset">
        <label class="fieldset__title text--p5" for="people">Number of People</label>
        <div class="fieldset__input">

          <img src="./images/icon-person.svg" alt="icon person">

          <input class="text--p3" type="number" id="people" name="people" placeholder="0">          
        </div>
      </fieldset>
    </form>

    <section class="results-container">
      <div class="results-details">
        <div class="money">
          <div>
            <p class="text--p5 text--p5--white">Tip Amount</p>

            <p class="text--p6 text--p6--grey">/ person</p>
          </div>

          <p class="text--p2 text--p2--green">$0.00</p>
        </div>

        <div class="money">
          <div>
            <p class="text--p5 text--p5--white">Total</p>

            <p class="text--p6 text--p6--grey">/ person</p>
          </div>

          <p class="text--p2 text--p2--green">$0.00</p>
        </div>
      </div>

      <button class="reset-button text--p4" type="reset" form="form-tip">Reset</button>
    </section>
  </main>
  
</body>
</html>
